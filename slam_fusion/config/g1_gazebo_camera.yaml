%YAML:1.0

# Camera parameters
File.version: "1.0"
Camera.type: "PinHole"
Camera1.fx: 381.36
Camera1.fy: 381.36
Camera1.cx: 320.5
Camera1.cy: 240.5

Camera1.k1: 0.0
Camera1.k2: 0.0
Camera1.p1: 0.0
Camera1.p2: 0.0

Camera.width: 640
Camera.height: 480

Camera.fps: 30

# Color order of the images (0: BGR, 1: RGB)
Camera.RGB: 1

# Depth baseline times fx
Camera.bf: 40.0     # Baseline (m) * fx. E.g., for 0.05m baseline: 0.05 * fx

Stereo.ThDepth: 40.0
Stereo.b: 0.07732

# ORB Parameters (Leave these as default)
ORBextractor.nFeatures: 1000
ORBextractor.scaleFactor: 1.2
ORBextractor.nLevels: 8
ORBextractor.iniThFAST: 20
ORBextractor.minThFAST: 7

# Depth map values factor (1.0 for Gazebo float32 meters)
RGBD.DepthMapFactor: 1.0

#--------------------------------------------------------------------------------------------
# Viewer Parameters
#--------------------------------------------------------------------------------------------
Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2.0
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -1.8
Viewer.ViewpointF: 500.0
